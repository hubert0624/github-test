name: Publish all 32 medication knowledge chapters

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download chapters 26 to 32 update
        shell: bash
        run: |
          set -euo pipefail
          rm -rf update update.zip
          mkdir -p update
          curl --fail --location --retry 4 --retry-delay 3 \
            --output update.zip "https://at.adobe.com/4aoX1g0EWYdtQcpA"
          unzip -q update.zip -d update
          test -f update/index.html
          test -f update/app.js
          test -f update/data/meta.json
          test -s update/data/chunk08.b64
          test -s update/data/chunk09.b64
          cp -a update/. ./

      - name: Validate complete website
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f app.js
          test -f style.css
          test -f data/meta.json
          for n in 01 02 03 04 05 06 07 08 09; do
            test -s "data/chunk${n}.b64"
          done
          grep -q '"num":32' data/meta.json
          grep -q '"total":14763' data/meta.json
          grep -q "搜尋藥名、症狀或問題" index.html
          if grep -R -n "canva\.com" index.html app.js data --exclude='*.md'; then
            echo "Canva link detected; refusing deployment."
            exit 1
          fi
          touch .nojekyll

      - name: Persist update in repository
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html app.js 404.html README.md .nojekyll data/meta.json data/chunk08.b64 data/chunk09.b64
          if ! git diff --cached --quiet; then
            git commit -m "Add chapters 26-32 to medication knowledge base [skip ci]"
            git push origin HEAD:master
          fi

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html app.js style.css 404.html .nojekyll _site/
          cp -a data _site/data
          if [ -f README.md ]; then cp README.md _site/README.md; fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
