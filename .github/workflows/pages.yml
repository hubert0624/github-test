name: Deploy complete medication knowledge website

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Download complete reviewed website
        run: |
          mkdir -p site
          curl -L --fail --retry 3 "https://at.adobe.com/Xpw7KB1XtMRacAoI" -o medicine_knowledge_site.zip
          unzip -q medicine_knowledge_site.zip -d site
          test -f site/index.html
          test -f site/app.js
          test -f site/data/meta.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
