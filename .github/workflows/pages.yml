name: Deploy complete medication knowledge website

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Download complete reviewed website
        run: |
          set -euo pipefail
          mkdir -p _site
          curl --fail --location --retry 3 --output site.zip "https://at.adobe.com/Xpw7KB1XtMRacAoI"
          unzip -q site.zip -d _site
          if [ ! -f _site/index.html ]; then
            first_index=$(find _site -mindepth 2 -name index.html -print -quit)
            if [ -n "$first_index" ]; then
              inner_dir=$(dirname "$first_index")
              cp -a "$inner_dir"/. _site/
            fi
          fi
          test -f _site/index.html
          grep -q "搜尋藥名、症狀或問題" _site/index.html
          if grep -R "canva.com" _site --exclude='*.md'; then
            echo "Canva link detected; refusing deployment."
            exit 1
          fi
          touch _site/.nojekyll
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
